services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: realestate
      POSTGRES_USER: ${POSTGRES_USER:-realestate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realestate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-realestate} -d realestate"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-realestate}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-realestate}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  core-api:
    build:
      context: ./core-api
      dockerfile: Dockerfile
    environment:
      POSTGRES_URL: ${POSTGRES_URL:-jdbc:postgresql://postgres:5432/realestate}
      POSTGRES_USER: ${POSTGRES_USER:-realestate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realestate}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://realestate:realestate@rabbitmq:5672/}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  agent-runtime:
    build:
      context: ./agent-runtime
      dockerfile: Dockerfile
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://realestate:realestate@rabbitmq:5672/}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-20}
      AGENT_BUDGET_TOKENS: ${AGENT_BUDGET_TOKENS:-200000}
      AGENT_TIMEOUT_SEC: ${AGENT_TIMEOUT_SEC:-120}
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 | grep -q 'Real-Estate'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
